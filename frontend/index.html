<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HMS - Hospital Management System</title>
    <script>
      // Set initial theme BEFORE React mounts, to prevent a flash of the
      // wrong theme. Reads user's saved choice, falls back to the OS setting.
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var useDark = saved ? saved === "dark" : prefersDark;
          if (useDark) document.documentElement.classList.add("dark");
        } catch (_) { /* localStorage may be blocked; ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
